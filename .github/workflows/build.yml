name: Build

# Continuous build: compiles SAIGuard.exe on every push/PR to main so a broken
# build is caught immediately, well before you cut a release tag.
# The compiled .exe is uploaded as a downloadable build artifact (no release).
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'assets/**'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with csc.exe
        shell: cmd
        run: |
          if exist SAIGuard.ico (
            set ICON=/win32icon:SAIGuard.ico
          ) else (
            set ICON=
          )
          C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe ^
            /out:SAIGuard.exe ^
            /target:winexe ^
            /optimize+ ^
            /nologo ^
            /r:System.Windows.Forms.dll ^
            /r:System.Drawing.dll ^
            %ICON% ^
            SAIGuard.cs

      - name: Verify build
        shell: cmd
        run: |
          if not exist SAIGuard.exe (
            echo Build failed!
            exit /b 1
          )
          dir SAIGuard.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAIGuard-exe
          path: SAIGuard.exe
          if-no-files-found: error
